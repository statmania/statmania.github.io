<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe - Stat Mania</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/main.js" defer></script>
        <style>
        h1 {
            text-align: center;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            cursor: pointer;
            border: 2px solid #333;
        }
        .cell:hover {
            background-color: #e0e0e0;
        }
        #message {
            margin-top: 20px;
            font-size: 1.2em;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <header></header>
     <div class="main-content">

<!-- Game Contents STARTS-->
    <h1>Misère Tic-Tac-Toe</h1>
    <div id="board">
        <div class="cell" onclick="playerMove(0)"></div>
        <div class="cell" onclick="playerMove(1)"></div>
        <div class="cell" onclick="playerMove(2)"></div>
        <div class="cell" onclick="playerMove(3)"></div>
        <div class="cell" onclick="playerMove(4)"></div>
        <div class="cell" onclick="playerMove(5)"></div>
        <div class="cell" onclick="playerMove(6)"></div>
        <div class="cell" onclick="playerMove(7)"></div>
        <div class="cell" onclick="playerMove(8)"></div>
    </div>
    <div id="message"></div>
    <button onclick="resetGame()">Restart Game</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X"; // Player starts as "X"
        let gameActive = true;

        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function playerMove(index) {
            if (board[index] === "" && gameActive) {
                board[index] = currentPlayer;
                document.getElementsByClassName("cell")[index].innerText = currentPlayer;
                if (checkForMisèreWinner()) {
                    return;
                }
                currentPlayer = currentPlayer === "X" ? "O" : "X"; // Switch turn
                if (currentPlayer === "O") computerMove();
            }
        }

        function computerMove() {
            // Simple random move for the computer (you can enhance this with AI if needed)
            let emptyCells = [];
            for (let i = 0; i < board.length; i++) {
                if (board[i] === "") emptyCells.push(i);
            }
            let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            board[randomIndex] = "O";
            document.getElementsByClassName("cell")[randomIndex].innerText = "O";
            checkForMisèreWinner();
            currentPlayer = "X"; // Switch back to player
        }

        function checkForMisèreWinner() {
            for (let i = 0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    if (currentPlayer === "X") {
                        document.getElementById("message").innerText = "You lose!";
                    } else {
                        document.getElementById("message").innerText = "Computer loses!";
                    }
                    gameActive = false;
                    return true;
                }
            }
            if (!board.includes("")) {
                document.getElementById("message").innerText = "It's a draw!";
                gameActive = false;
                return true;
            }
            return false;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            currentPlayer = "X";
            let cells = document.getElementsByClassName("cell");
            for (let i = 0; i < cells.length; i++) {
                cells[i].innerText = "";
            }
            document.getElementById("message").innerText = "";
        }
    </script>

<!-- Game Contents ENDS-->

  </div>
    <footer></footer>
</body>
</html>
